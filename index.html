<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Gold AI | Multi-Universal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zion-gold-ultimate';

        window.zionDB = { db, collection, addDoc, query, onSnapshot, serverTimestamp, auth, appId, doc, setDoc, signInAnonymously, onAuthStateChanged, signInWithCustomToken };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root { --gold: #D4AF37; --dark-gold: #996515; --rich-black: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--rich-black); color: #e5e5e5; margin: 0; overflow-x: hidden; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .gold-text { background: linear-gradient(to right, #fbf5b7, #D4AF37, #996515); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-gold { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .auth-card { background: linear-gradient(145deg, #111, #050505); border: 1px solid rgba(212, 175, 55, 0.2); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .input-gold { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.2); color: white; outline: none; transition: 0.3s; }
        .input-gold:focus { border-color: var(--gold); background: rgba(255, 255, 255, 0.07); }
        .chat-container { height: 450px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { max-width: 85%; padding: 1rem 1.4rem; border-radius: 1.2rem; line-height: 1.5; animation: slideIn 0.3s ease-out; word-wrap: break-word; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ai-message { background: rgba(255, 255, 255, 0.04); align-self: flex-start; border-left: 3px solid var(--gold); }
        .user-message { background: linear-gradient(135deg, #D4AF37, #996515); color: #000; font-weight: 600; align-self: flex-end; }
        .auth-view { display: none; }
        .auth-view.active { display: block; }
        .mode-btn { border: 1px solid rgba(212, 175, 55, 0.3); background: transparent; color: #aaa; transition: 0.3s; }
        .mode-btn.active { background: var(--gold); color: black; border-color: var(--gold); transform: scale(1.05); }
        .panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .typing-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid var(--gold); }
        
        /* Sparkle effect for AI buttons */
        .sparkle-btn { position: relative; overflow: hidden; }
        .sparkle-btn::after { content: '✨'; position: absolute; right: 5px; top: 2px; font-size: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 z-[1000] bg-black flex items-center justify-center p-4">
        <div class="auth-card p-10 rounded-[2.5rem] w-full max-w-md text-center">
            <h1 class="serif-font text-5xl gold-text mb-2">ZION</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.5em] uppercase mb-8">Universal Intelligence</p>
            
            <div id="login-view" class="auth-view active space-y-4">
                <input type="email" id="login-email" placeholder="የኢሜይል አድራሻ" class="w-full input-gold py-4 px-5 rounded-xl text-sm">
                <input type="password" id="login-password" maxlength="6" placeholder="የይለፍ ቃል (6 አሃዝ)" class="w-full input-gold py-4 px-5 rounded-xl text-sm text-center tracking-widest">
                <div class="flex justify-between text-[11px] px-1">
                    <button onclick="switchAuthView('signup')" class="text-gold font-bold">አዲስ አካውንት</button>
                    <button onclick="switchAuthView('admin')" class="text-zinc-600 italic">የአስተዳዳሪ መግቢያ</button>
                </div>
                <button onclick="handleLogin()" class="w-full bg-gold text-black py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg hover:brightness-110 transition">መግቢያ</button>
            </div>

            <div id="admin-view" class="auth-view space-y-4">
                <div class="bg-red-500/10 border border-red-500/20 py-2 rounded-lg mb-2">
                    <p class="text-[9px] text-red-500 font-bold uppercase">Restricted Admin Portal</p>
                </div>
                <input type="password" id="admin-password" placeholder="የአስተዳዳሪ ኮድ" class="w-full input-gold py-4 px-5 rounded-xl text-sm text-center">
                <button onclick="handleAdminLogin()" class="w-full bg-white text-black py-4 rounded-xl font-bold uppercase shadow-lg">ባለስልጣን መለያ</button>
                <button onclick="switchAuthView('login')" class="text-zinc-500 text-[11px] block mx-auto">ተመለስ</button>
            </div>

            <div id="signup-view" class="auth-view space-y-4">
                <input type="text" id="signup-name" placeholder="ሙሉ ስም" class="w-full input-gold py-4 px-5 rounded-xl text-sm">
                <input type="email" id="signup-email" placeholder="ኢሜይል" class="w-full input-gold py-4 px-5 rounded-xl text-sm">
                <input type="password" id="signup-password" maxlength="6" placeholder="የይለፍ ቃል (6 አሃዝ ይሁን)" class="w-full input-gold py-4 px-5 rounded-xl text-sm text-center">
                <button onclick="handleSignup()" class="w-full bg-gold text-black py-4 rounded-xl font-bold uppercase shadow-lg">ይመዝገቡ</button>
                <button onclick="switchAuthView('login')" class="text-gold text-[11px] block mx-auto">ተመልሰህ ግባ</button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass-gold py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-2xl font-black serif-font gold-text">ጽዮን AI</div>
        <div id="user-info" class="hidden flex items-center gap-4">
            <span id="admin-badge" class="hidden text-[8px] bg-red-600 text-white px-2 py-1 rounded font-black">ADMIN</span>
            <div id="avatar" class="w-10 h-10 rounded-full bg-gold/20 border border-gold/30 flex items-center justify-center text-gold font-bold"></div>
        </div>
    </nav>

    <main class="pt-24 pb-10 px-4 max-w-5xl mx-auto">
        <!-- Thinking Mode Selector -->
        <div class="flex justify-center flex-wrap gap-2 mb-6">
            <button onclick="setMode('fast')" id="mode-fast" class="mode-btn active text-[9px] px-5 py-2 rounded-full font-bold uppercase tracking-widest">Fast Thinking</button>
            <button onclick="setMode('pro')" id="mode-pro" class="mode-btn text-[9px] px-5 py-2 rounded-full font-bold uppercase tracking-widest">Pro Mode</button>
            <button onclick="setMode('vision')" id="mode-vision" class="mode-btn text-[9px] px-5 py-2 rounded-full font-bold uppercase tracking-widest">Vision Analysis</button>
        </div>

        <!-- AI Assistant Tools (New Gemini Features) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
             <button onclick="generateAIFeature('summarize')" class="sparkle-btn text-[10px] bg-white/5 border border-gold/20 py-3 rounded-xl hover:bg-gold/10 transition">✨ አጭር ማጠቃለያ</button>
             <button onclick="generateAIFeature('suggest')" class="sparkle-btn text-[10px] bg-white/5 border border-gold/20 py-3 rounded-xl hover:bg-gold/10 transition">✨ ቀጣይ ሀሳብ</button>
             <button onclick="generateAIFeature('translate')" class="sparkle-btn text-[10px] bg-white/5 border border-gold/20 py-3 rounded-xl hover:bg-gold/10 transition">✨ ወደ እንግሊዝኛ</button>
             <button onclick="generateAIFeature('analyze_health')" class="sparkle-btn text-[10px] bg-white/5 border border-gold/20 py-3 rounded-xl hover:bg-gold/10 transition">✨ የጤና ትንተና</button>
        </div>

        <div class="glass-gold rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-4 border-b border-gold/10 grid grid-cols-2 md:grid-cols-4 gap-2 bg-white/5">
                <button onclick="setContext('Health')" class="text-[9px] bg-red-500/10 text-red-400 border border-red-500/20 py-2 rounded-lg font-bold"><i class="fas fa-heartbeat mr-2"></i>HEALTH</button>
                <button onclick="setContext('Business')" class="text-[9px] bg-blue-500/10 text-blue-400 border border-blue-500/20 py-2 rounded-lg font-bold"><i class="fas fa-briefcase mr-2"></i>BUSINESS</button>
                <button onclick="setContext('Education')" class="text-[9px] bg-green-500/10 text-green-400 border border-green-500/20 py-2 rounded-lg font-bold"><i class="fas fa-graduation-cap mr-2"></i>EDUCATION</button>
                <button onclick="setContext('Lifestyle')" class="text-[9px] bg-purple-500/10 text-purple-400 border border-purple-500/20 py-2 rounded-lg font-bold"><i class="fas fa-leaf mr-2"></i>LIFESTYLE</button>
            </div>

            <div id="chat-box" class="chat-container"></div>

            <div id="typing" class="px-10 py-4 hidden">
                <div class="flex gap-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
            </div>

            <div class="p-6 bg-black/40 border-t border-gold/10">
                <!-- Image Preview Area -->
                <div id="preview-container" class="hidden mb-4 p-3 bg-white/5 rounded-2xl flex items-center gap-4 animate-pulse">
                    <img id="image-display" class="preview-img">
                    <div class="flex-1">
                        <p class="text-[10px] text-gold font-bold">Image Uploaded Successfully</p>
                        <p class="text-[8px] text-zinc-500">Processing with Vision Core...</p>
                    </div>
                    <button onclick="clearImage()" class="w-8 h-8 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition"><i class="fas fa-times"></i></button>
                </div>

                <form id="chat-form" class="flex gap-3 items-center">
                    <div class="flex gap-2">
                        <label class="cursor-pointer group">
                            <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImage(this)">
                            <div class="w-12 h-12 bg-white/5 border border-gold/20 rounded-xl flex items-center justify-center group-hover:border-gold transition"><i class="fas fa-camera text-gray-400 group-hover:text-gold"></i></div>
                        </label>
                        <button type="button" onclick="startVoice()" class="w-12 h-12 bg-white/5 border border-gold/20 rounded-xl flex items-center justify-center hover:border-gold transition"><i class="fas fa-microphone text-gray-400" id="mic-icon"></i></button>
                    </div>
                    
                    <input type="text" id="user-input" placeholder="ጥያቄዎን እዚህ ይጻፉ..." class="flex-1 bg-white/5 border border-gold/20 py-3 px-5 rounded-xl outline-none focus:border-gold">
                    
                    <div class="flex gap-2">
                        <button type="submit" class="w-12 h-12 bg-gold rounded-xl text-black shadow-lg hover:scale-105 transition"><i class="fas fa-paper-plane"></i></button>
                        <button type="button" onclick="openVideoCall()" class="w-12 h-12 bg-blue-600 rounded-xl text-white shadow-lg hover:scale-105 transition"><i class="fas fa-video"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Video Call Mock -->
    <div id="video-panel" class="panel flex-col">
        <div class="relative w-full max-w-2xl aspect-video bg-zinc-900 rounded-[2rem] border border-gold overflow-hidden">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="text-center">
                    <div class="w-20 h-20 bg-gold/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-gold">
                         <i class="fas fa-robot text-gold text-3xl animate-pulse"></i>
                    </div>
                    <h3 class="gold-text serif-font text-2xl">የጽዮን የቀጥታ አማካሪ</h3>
                    <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-2">Active Strategic Session</p>
                </div>
            </div>
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-6">
                <button class="w-14 h-14 bg-red-600 rounded-full flex items-center justify-center shadow-2xl" onclick="closeVideoCall()"><i class="fas fa-phone-slash text-white"></i></button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // API Key provided at runtime
        let currentUser = null;
        let activeMode = 'fast';
        let activeContext = 'General';
        let base64Image = null;
        let lastAiMessage = ""; // Track last AI response for features

        function switchAuthView(view) {
            document.querySelectorAll('.auth-view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${view}-view`).classList.add('active');
        }

        function handleLogin() {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            if(e.includes("@") && p.length === 6) {
                login({ name: e.split('@')[0], email: e, role: 'user' });
            } else alert("ትክክለኛ ኢሜይል እና ባለ 6 አሃዝ Password ያስገቡ።");
        }

        function handleAdminLogin() {
            const p = document.getElementById('admin-password').value;
            if(p === "ZionGold2025") {
                login({ name: "Master Admin", email: "admin@zion.ai", role: 'admin' });
            } else alert("የአስተዳዳሪ ኮድ ስህተት ነው።");
        }

        function handleSignup() {
            const n = document.getElementById('signup-name').value;
            const e = document.getElementById('signup-email').value;
            const p = document.getElementById('signup-password').value;
            if(n && e.includes("@") && p.length === 6) login({ name: n, email: e, role: 'user' });
            else alert("መረጃዎችን በትክክል ይሙሉ (6 አሃዝ Password ያስፈልጋል)።");
        }

        function login(user) {
            currentUser = user;
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('avatar').innerText = user.name[0].toUpperCase();
            if(user.role === 'admin') document.getElementById('admin-badge').classList.remove('hidden');
            appendMessage(`ሰላም ${user.name}! እኔ ጽዮን ነኝ። የፈለጉትን ጥያቄ በፅሁፍ፣ በምስል ወይም በድምፅ መጠየቅ ይችላሉ።`, 'ai');
        }

        function setMode(mode) {
            activeMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            appendMessage(`ወደ ${mode.toUpperCase()} ሞድ ተቀይሯል።`, 'ai');
        }

        function setContext(ctx) {
            activeContext = ctx;
            appendMessage(`የ${ctx} አማካሪ ክፍል ገብተዋል።`, 'ai');
        }

        function handleImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                base64Image = e.target.result.split(',')[1];
                document.getElementById('image-display').src = e.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                setMode('vision');
            };
            reader.readAsDataURL(file);
        }

        function clearImage() { 
            base64Image = null; 
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('image-input').value = '';
        }

        async function startVoice() {
            const mic = document.getElementById('mic-icon');
            if (!('webkitSpeechRecognition' in window)) return alert("Voice not supported.");
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'am-ET';
            recognition.onstart = () => mic.className = "fas fa-circle text-red-500 animate-pulse";
            recognition.onresult = (e) => {
                document.getElementById('user-input').value = e.results[0][0].transcript;
                mic.className = "fas fa-microphone text-gold";
            };
            recognition.onerror = () => mic.className = "fas fa-microphone text-gold";
            recognition.start();
        }

        // New AI Logic for features
        async function generateAIFeature(type) {
            if (!lastAiMessage && type !== 'analyze_health') return alert("መጀመሪያ ውይይት ይጀምሩ።");
            
            document.getElementById('typing').classList.remove('hidden');
            let prompt = "";
            switch(type) {
                case 'summarize': prompt = `Summarize this text briefly in Amharic: ${lastAiMessage}`; break;
                case 'suggest': prompt = `Suggest the next logical step or question based on this in Amharic: ${lastAiMessage}`; break;
                case 'translate': prompt = `Translate this to English: ${lastAiMessage}`; break;
                case 'analyze_health': prompt = `Provide 3 general health tips for a productive day in Amharic.`; break;
            }

            const response = await getAIResponse(prompt);
            document.getElementById('typing').classList.add('hidden');
            appendMessage(response, 'ai');
        }

        async function getAIResponse(prompt, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const sys = `You are Zion Gold AI. Context: ${activeContext}. Mode: ${activeMode}. Respond in professional Amharic. If an image is provided, analyze it deeply.`;

            const payload = {
                contents: [{
                    parts: [
                        { text: prompt },
                        ...(base64Image ? [{ inlineData: { mimeType: "image/png", data: base64Image } }] : [])
                    ]
                }],
                systemInstruction: { parts: [{ text: sys }] }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload) 
                    });
                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        lastAiMessage = text;
                        return text;
                    }
                    throw new Error("No text returned");
                } catch (e) {
                    if (i === retries - 1) return "ይቅርታ፣ ኔትዎርክ መቆራረጥ አጋጥሟል። እባክዎ እንደገና ይሞክሩ።";
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                }
            }
        }

        function appendMessage(text, role) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message-bubble ${role}-message shadow-xl`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val && !base64Image) return;

            appendMessage(val || "ይህን ምስል ተንትኚልኝ", 'user');
            input.value = '';
            document.getElementById('typing').classList.remove('hidden');

            const res = await getAIResponse(val || "Analyze this image");
            document.getElementById('typing').classList.add('hidden');
            appendMessage(res, 'ai');
            clearImage();
        });

        function openVideoCall() { document.getElementById('video-panel').style.display = 'flex'; }
        function closeVideoCall() { document.getElementById('video-panel').style.display = 'none'; }
        window.onload = () => { if(window.zionDB) window.zionDB.signInAnonymously(window.zionDB.auth); };
    </script>
</body>
</html>
