<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጽዮን ጎልድ AI | ሁለንተናዊ እውቀት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zion-gold-unique-id';

        window.zionDB = { 
            db, 
            collection, 
            addDoc, 
            query, 
            onSnapshot, 
            serverTimestamp, 
            auth, 
            appId, 
            doc, 
            setDoc,
            signInAnonymously,
            onAuthStateChanged,
            signInWithCustomToken
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --rich-black: #050505;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--rich-black);
            color: #e5e5e5;
            overflow-x: hidden;
        }

        .serif-font { font-family: 'Playfair Display', serif; }

        .gold-text {
            background: linear-gradient(to right, #fbf5b7, #D4AF37, #996515);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-gold {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .auth-card {
            background: linear-gradient(145deg, #111, #050505);
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .input-gold {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            transition: 0.3s ease-in-out;
        }

        .input-gold:focus { border-color: var(--gold); outline: none; background: rgba(255, 255, 255, 0.07); }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
        }

        .chat-container {
            height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--gold) #111;
        }

        .message-bubble {
            max-width: 85%;
            margin-bottom: 1.5rem;
            padding: 1.2rem 1.6rem;
            border-radius: 1.4rem;
            line-height: 1.6;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-message { background: rgba(255, 255, 255, 0.04); align-self: flex-start; border-left: 4px solid var(--gold); }
        .user-message { background: linear-gradient(135deg, #D4AF37, #996515); color: #000; font-weight: 600; align-self: flex-end; }

        #admin-panel, #ai-insight-panel {
            display: none;
            position: fixed;
            top: 0; right: 0;
            width: 400px; height: 100vh;
            background: #0a0a0a;
            border-left: 1px solid var(--gold);
            z-index: 1001;
            padding: 2rem;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .typing-dot {
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- የአስተዳዳሪ ክፍል (Admin Panel) -->
    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="gold-text font-bold text-xl uppercase tracking-widest">የአስተዳዳሪ ቁጥጥር</h2>
            <button onclick="togglePanel('admin-panel')" class="text-white"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-6">
            <div class="bg-white/5 p-4 rounded-xl border border-gold/20">
                <h3 class="text-xs font-bold text-gold uppercase mb-3">የተጠቃሚዎች እንቅስቃሴ</h3>
                <div id="admin-logs" class="text-[11px] text-gray-400 space-y-2 max-h-96 overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <!-- የAI ግንዛቤ ፓነል (AI Insight Panel) -->
    <div id="ai-insight-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="gold-text font-bold text-xl uppercase tracking-widest">✨ የAI ጥልቀት</h2>
            <button onclick="togglePanel('ai-insight-panel')" class="text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="insight-content" class="space-y-6">
            <p class="text-sm text-gray-400 italic">ከውይይቱ ግንዛቤዎችን ለማመንጨት ከላይ ያሉትን አማራጮች ይምረጡ።</p>
        </div>
    </div>

    <!-- የመግቢያ ገጽ (English Login) -->
    <div id="auth-modal" class="fixed inset-0 z-[1000] bg-black/95 flex items-center justify-center p-4">
        <div class="auth-card p-10 rounded-[2.5rem] w-full max-w-md text-center">
            <div class="mb-8">
                <h1 class="serif-font text-5xl gold-text mb-2 tracking-tighter">ZION</h1>
                <p class="text-gray-500 text-[10px] tracking-[0.5em] uppercase">Universal AI Intelligence</p>
            </div>
            
            <div id="auth-view" class="space-y-4">
                <div class="space-y-2 mb-4">
                    <button onclick="mockSocialLogin('Google')" class="social-btn text-white">
                        <i class="fab fa-google text-xl text-red-500"></i> Continue with Google
                    </button>
                    <button onclick="mockSocialLogin('Facebook')" class="social-btn text-blue-500">
                        <i class="fab fa-facebook text-xl"></i> Continue with Facebook
                    </button>
                    <button onclick="mockSocialLogin('Apple')" class="social-btn text-white">
                        <i class="fab fa-apple text-xl"></i> Continue with Apple
                    </button>
                </div>

                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-white/10"></div>
                    <span class="flex-shrink mx-4 text-gray-600 text-[10px] uppercase font-bold tracking-widest">Or Email Login</span>
                    <div class="flex-grow border-t border-white/10"></div>
                </div>

                <div class="space-y-3">
                    <input type="email" id="login-email" placeholder="Email Address" class="w-full input-gold py-3 px-5 rounded-xl text-sm">
                    <input type="password" id="login-password" placeholder="Password" class="w-full input-gold py-3 px-5 rounded-xl text-sm">
                    
                    <div class="flex justify-end px-1">
                        <button onclick="handleForgotPassword()" class="text-[10px] text-gold hover:underline">Forgot Password?</button>
                    </div>

                    <button onclick="handleEmailLogin()" class="w-full bg-gold text-black py-4 rounded-xl font-bold uppercase tracking-widest hover:brightness-110 transition mt-2 shadow-lg">Sign In</button>
                </div>
                
                <div class="pt-4 border-t border-white/5">
                    <p class="text-xs text-gray-400">Don't have an account? 
                        <button onclick="handleCreateAccount()" class="text-gold font-bold hover:underline ml-1">Create Account</button>
                    </p>
                </div>

                <p class="text-[9px] text-gray-700 mt-4">By continuing, you agree to Zion's Terms of Service and Privacy Policy.</p>
            </div>
        </div>
    </div>

    <nav class="fixed w-full z-50 glass-gold py-5 px-6 md:px-12 flex justify-between items-center">
        <div class="text-2xl font-black serif-font gold-text tracking-widest">ጽዮን</div>
        <div class="flex gap-4 items-center">
            <button id="admin-btn" onclick="togglePanel('admin-panel')" class="hidden text-[10px] bg-red-600/20 text-red-500 border border-red-500/30 px-4 py-2 rounded-full font-bold uppercase">ቁጥጥር</button>
            <div id="user-info" class="hidden flex items-center gap-3">
                <span id="display-name" class="text-xs gold-text font-bold"></span>
                <img id="display-avatar" src="" class="w-10 h-10 rounded-full border border-gold/30">
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-20 px-4">
        <div class="max-w-4xl mx-auto glass-gold rounded-[3rem] overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-gold/10 flex justify-between items-center bg-white/5">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-gold rounded-xl flex items-center justify-center shadow-lg rotate-3"><i class="fas fa-robot text-black text-xl"></i></div>
                    <div>
                        <h2 class="font-bold text-white serif-font text-lg">የጽዮን እውቀት</h2>
                        <p class="text-[9px] text-gold/60 uppercase font-black">በGemini የሚሰራ</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="runGeminiFeature('brainstorm')" class="text-[10px] bg-gold/10 text-gold border border-gold/30 px-4 py-2 rounded-full font-bold hover:bg-gold hover:text-black transition">✨ አዳዲስ ሃሳቦች</button>
                    <button onclick="runGeminiFeature('sentiment')" class="text-[10px] bg-white/5 text-gray-300 border border-white/10 px-4 py-2 rounded-full font-bold hover:bg-white/10 transition">✨ ትንተና</button>
                </div>
            </div>

            <div id="chat-box" class="chat-container p-8 md:p-12 flex flex-col space-y-6"></div>

            <div id="typing" class="px-12 py-4 hidden">
                <div class="flex gap-2"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
            </div>

            <div class="p-8 bg-black/40 border-t border-gold/10">
                <form id="chat-form" class="flex gap-4">
                    <input type="text" id="user-input" placeholder="ጥያቄዎን እዚህ ይጻፉ..." class="flex-1 bg-white/5 border border-gold/20 py-4 px-6 rounded-2xl outline-none focus:border-gold">
                    <button type="submit" class="w-14 h-14 bg-gold rounded-2xl text-black flex items-center justify-center shadow-xl hover:scale-105 transition"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </section>

    <script>
        const apiKey = ""; 
        let currentUser = null;
        let isAuthReady = false;
        let messageThread = [];
        const ADMIN_CRED = { e: "admin@zion.ai", p: "ZionGold2025" };

        async function initApp() {
            if (!window.zionDB) return;
            const { auth, signInAnonymously, onAuthStateChanged } = window.zionDB;
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        isAuthReady = true;
                        console.log("Auth Active");
                    }
                });
            } catch (err) { console.error(err); }
        }

        function handleEmailLogin() {
            const e = document.getElementById('login-email').value;
            const p = document.getElementById('login-password').value;
            if (e === ADMIN_CRED.e && p === ADMIN_CRED.p) {
                loginUser({ name: "አስተዳዳሪ", role: "admin", email: e });
            } else if (e.includes("@") && p.length > 5) {
                loginUser({ name: e.split('@')[0], role: "user", email: e });
            } else {
                alert("Invalid credentials. Please try again.");
            }
        }

        function mockSocialLogin(provider) {
            loginUser({ name: `${provider} User`, role: "user", email: `${provider.toLowerCase()}@example.com` });
        }

        function handleCreateAccount() {
            const e = prompt("Enter your email for new account:");
            if (e && e.includes("@")) {
                loginUser({ name: e.split('@')[0], role: "user", email: e });
            }
        }

        function handleForgotPassword() {
            const e = prompt("Enter your email to reset password:");
            if (e) alert("Reset link sent to " + e);
        }

        function loginUser(user) {
            currentUser = user;
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('display-name').innerText = user.name;
            document.getElementById('display-avatar').src = `https://api.dicebear.com/7.x/initials/svg?seed=${user.name}`;
            if (user.role === 'admin') {
                document.getElementById('admin-btn').classList.remove('hidden');
                setupAdminMonitoring();
            }
            logActivity(`User ${user.name} logged in`);
            appendMessage(`እንኳን ደህና መጡ ${user.name}! እኔ ጽዮን ነኝ። ዛሬ በምን ላግዝዎት እችላለሁ?`, 'ai');
        }

        async function logActivity(action) {
            if (!isAuthReady || !window.zionDB) return;
            const { db, collection, addDoc, serverTimestamp, appId } = window.zionDB;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    user: currentUser?.name || 'እንግዳ',
                    action: action,
                    timestamp: serverTimestamp()
                });
            } catch (err) { console.error(err); }
        }

        function setupAdminMonitoring() {
            if (!isAuthReady || !window.zionDB) return;
            const { db, collection, query, onSnapshot, appId } = window.zionDB;
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'logs'));
            onSnapshot(q, (snapshot) => {
                const logContainer = document.getElementById('admin-logs');
                logContainer.innerHTML = '';
                snapshot.docs.forEach(doc => {
                    const data = doc.data();
                    const log = document.createElement('div');
                    log.className = "border-b border-white/5 pb-2";
                    log.innerHTML = `<span class="text-gold font-bold">[${data.user}]</span>: ${data.action}`;
                    logContainer.prepend(log);
                });
            }, (err) => console.error(err));
        }

        function togglePanel(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function getAI(prompt, systemMsg = "You are Zion, an elite AI advisor. Respond primarily in Amharic (አማርኛ) unless specified otherwise.") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemMsg }] }
                    })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (err) { return "ይቅርታ፣ ችግር ተፈጥሯል። እባክዎ ቆይተው ይሞክሩ።"; }
        }

        async function runGeminiFeature(type) {
            if (messageThread.length < 1) {
                alert("እባክዎ መጀመሪያ ውይይት ይጀምሩ።");
                return;
            }
            togglePanel('ai-insight-panel');
            const content = document.getElementById('insight-content');
            content.innerHTML = `<div class="flex justify-center p-10"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
            
            const history = messageThread.slice(-5).join("\n");
            let prompt = "";
            let sys = "You are a strategic consultant. Respond in clear and professional Amharic (አማርኛ).";

            if (type === 'brainstorm') {
                prompt = `ካደረግነው ውይይት በመነሳት፣ 3 አዳዲስ እና ጠቃሚ ቀጣይ እርምጃዎችን በአማርኛ ጥቆማ ስጥ:\n${history}`;
            } else {
                prompt = `በዚህ ውይይት ውስጥ ያለውን የተጠቃሚውን ስሜት እና ፍላጎት በአማርኛ ተንትን:\n${history}`;
            }

            const result = await getAI(prompt, sys);
            content.innerHTML = `
                <div class="bg-white/5 p-6 rounded-2xl border border-gold/20 leading-relaxed text-sm">
                    <h4 class="text-gold font-bold mb-4 uppercase tracking-widest text-xs">${type === 'brainstorm' ? 'ስትራቴጂካዊ ሃሳቦች' : 'የውይይት ትንተና'}</h4>
                    ${result.replace(/\n/g, '<br>')}
                </div>
            `;
        }

        function appendMessage(text, role) {
            const box = document.getElementById('chat-box');
            const b = document.createElement('div');
            b.className = `${role}-message message-bubble shadow-lg`;
            b.innerText = text;
            box.appendChild(b);
            box.scrollTo(0, box.scrollHeight);
            messageThread.push(`${role.toUpperCase()}: ${text}`);
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            appendMessage(val, 'user');
            logActivity(`ጥያቄ: ${val.substring(0, 30)}`);
            input.value = '';

            document.getElementById('typing').classList.remove('hidden');
            const aiRes = await getAI(val);
            document.getElementById('typing').classList.add('hidden');
            
            appendMessage(aiRes, 'ai');
        });

        window.onload = () => { setTimeout(initApp, 500); };
    </script>
</body>
</html>
