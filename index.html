<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Gold AI | Universal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zion-gold-ultimate';

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth failed", err);
            }
        };
        initAuth();

        window.zionDB = { db, auth, appId, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        :root { --gold: #D4AF37; --dark-gold: #996515; --rich-black: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--rich-black); color: #e5e5e5; margin: 0; overflow: hidden; }
        .gold-text { background: linear-gradient(to right, #fbf5b7, #D4AF37, #996515); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-gold { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.15); }
        .chat-container { height: calc(100vh - 180px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { max-width: 80%; padding: 1rem; border-radius: 1rem; line-height: 1.5; font-size: 0.95rem; }
        .ai-message { background: rgba(255, 255, 255, 0.05); align-self: flex-start; border-left: 3px solid var(--gold); }
        .user-message { background: linear-gradient(135deg, #D4AF37, #996515); color: black; align-self: flex-end; font-weight: 600; }
        .typing-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <nav class="p-4 glass-gold flex justify-between items-center z-50">
        <h1 class="text-xl font-bold gold-text italic">ZION GOLD AI</h1>
        <div id="status-dot" class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e]"></div>
    </nav>

    <div id="chat-box" class="chat-container flex-1">
        <div class="ai-message message-bubble">ሰላም! እኔ የጽዮን AI ረዳት ነኝ። ዛሬ በምን ልርዳዎት? ሁሉንም ጥያቄዎችዎን በአማርኛ መመለስ እችላለሁ።</div>
    </div>

    <div id="typing" class="px-6 py-2 hidden"><div class="flex gap-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>

    <div class="p-4 glass-gold">
        <form id="chat-form" class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="user-input" placeholder="ጥያቄዎን እዚህ ይጻፉ..." class="flex-1 bg-white/5 border border-gold/20 p-3 rounded-xl outline-none focus:border-gold text-white">
            <button type="submit" class="bg-gold text-black px-6 py-3 rounded-xl font-bold hover:scale-105 transition">ላክ</button>
        </form>
    </div>

    <script>
        const apiKey = ""; 

        async function getAIResponse(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are Zion Gold AI, a luxury strategic assistant. You MUST respond in professional and clear Amharic. Be helpful, polite, and precise." }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "ይቅርታ፣ ምላሽ ማግኘት አልተቻለም። እባክዎ እንደገና ይሞክሩ።";
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        function appendMessage(text, role) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message-bubble ${role}-message shadow-lg`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val) return;

            appendMessage(val, 'user');
            input.value = '';
            document.getElementById('typing').classList.remove('hidden');

            try {
                const aiRes = await getAIResponse(val);
                document.getElementById('typing').classList.add('hidden');
                appendMessage(aiRes, 'ai');
            } catch (err) {
                document.getElementById('typing').classList.add('hidden');
                appendMessage("የኔትዎርክ ችግር አጋጥሟል። እባክዎ ኢንተርኔትዎን አረጋግጠው እንደገና ይሞክሩ።", 'ai');
            }
        });
    </script>
</body>
</html>
