<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Gold AI | Universal Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --gold: #D4AF37;
            --dark-gold: #996515;
            --rich-black: #050505;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--rich-black);
            color: #e5e5e5;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .gold-text {
            background: linear-gradient(to right, #fbf5b7, #D4AF37, #996515);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-gold {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 18px 22px;
            border-radius: 25px;
            line-height: 1.6;
            font-size: 16px;
            animation: fadeIn 0.4s ease-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border-left: 5px solid var(--gold);
            border-bottom-left-radius: 5px;
        }

        .user-message {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: black;
            align-self: flex-end;
            font-weight: 600;
            border-bottom-right-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #auth-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s ease;
        }

        .input-area {
            background: rgba(15, 15, 15, 0.9);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--gold);
        }

        .input-gold {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: white;
            transition: 0.3s ease-in-out;
        }

        .input-gold:focus {
            border-color: var(--gold);
            outline: none;
            background: rgba(255, 255, 255, 0.07);
        }

        .typing-indicator {
            font-size: 12px;
            color: var(--gold);
            margin-bottom: 5px;
            display: none;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-modal">
        <div class="bg-zinc-950 p-10 rounded-[3rem] border border-gold/20 w-full max-w-md text-center shadow-2xl mx-4">
            <h1 class="text-5xl font-bold gold-text mb-2 serif-font">ZION</h1>
            <p class="text-[10px] text-zinc-500 tracking-[0.5em] uppercase mb-8">Universal Intelligence</p>
            
            <!-- Social Logins -->
            <div class="mb-6">
                <button onclick="socialLogin('Google')" class="social-btn text-white">
                    <i class="fab fa-google text-red-500"></i> Tsena ka Google
                </button>
                <button onclick="socialLogin('Facebook')" class="social-btn text-white">
                    <i class="fab fa-facebook text-blue-600"></i> Tsena ka Facebook
                </button>
            </div>

            <div class="relative flex items-center py-4 mb-4">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink mx-4 text-gray-600 text-[10px] uppercase font-bold">Goba ka Email</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <!-- Email Form -->
            <div class="space-y-4">
                <input type="email" id="user-email" placeholder="Email Address" 
                    class="w-full input-gold py-4 px-6 rounded-2xl text-sm outline-none">
                <input type="password" id="access-code" placeholder="Password" 
                    class="w-full input-gold py-4 px-6 rounded-2xl text-sm outline-none">
                
                <button onclick="unlockApp()" 
                    class="w-full bg-gradient-to-r from-gold to-dark-gold text-black py-4 rounded-2xl font-black tracking-widest hover:brightness-110 active:scale-95 transition-all shadow-xl">
                    AUTHORIZE ENTRY
                </button>
            </div>
            <p class="text-[9px] text-zinc-600 mt-6 font-mono">Demo Password: ZionGold2025</p>
        </div>
    </div>

    <!-- Main Navigation -->
    <nav class="p-6 glass-gold flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gold rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-brain text-black text-xl"></i>
            </div>
            <span class="text-2xl font-bold gold-text tracking-tighter">ጽዮን AI</span>
        </div>
        <div id="user-tag" class="text-[10px] bg-gold/10 text-gold px-3 py-1 rounded-full border border-gold/20 font-bold">V2.5 PRO</div>
    </nav>

    <!-- Chat Workspace -->
    <main class="flex-1 flex flex-col max-w-5xl mx-auto w-full">
        <div id="chat-box" class="chat-container">
            <!-- Messages appear here -->
        </div>

        <div id="typing" class="typing-indicator">ጽዮን መልስ እያዘጋጀች ነው...</div>

        <div class="input-area">
            <div class="flex gap-3 items-center">
                <input type="text" id="user-input" placeholder="ጥያቄዎን እዚህ በጥልቀት ይጻፉ..." 
                    class="flex-1 bg-white/5 border border-gold/20 p-5 rounded-[2rem] text-white outline-none focus:border-gold transition-all focus:bg-white/10 shadow-inner">
                <button onclick="handleSend()" 
                    class="bg-gradient-to-b from-gold to-dark-gold w-16 h-16 rounded-full text-black shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        // API Key is empty for demo
        const apiKey = ""; 

        function socialLogin(provider) {
            // Mock social login
            console.log(`Logging in with ${provider}`);
            completeAuth(`User (${provider})`);
        }

        function unlockApp() {
            const email = document.getElementById('user-email').value;
            const code = document.getElementById('access-code').value;
            
            // Logic for Demo (Admin) or any email with 2025 password
            if(code === "ZionGold2025") {
                const displayName = email ? email.split('@')[0].toUpperCase() : "ADMIN";
                completeAuth(displayName);
            } else {
                alert("Ntshelete ya go tsena ga se ya lere. (Incorrect Password)");
            }
        }

        function completeAuth(name) {
            const modal = document.getElementById('auth-modal');
            modal.style.opacity = '0';
            document.getElementById('user-tag').innerText = name;
            setTimeout(() => {
                modal.style.display = 'none';
                appendMessage(`እንኳን ደህና መጡ ${name}! እኔ ጽዮን ነኝ። ዛሬ በምን ዓይነት ስትራቴጂካዊ ጉዳይ ላግዝዎት እችላለሁ?`, 'ai');
            }, 500);
        }

        function appendMessage(text, role) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${role}-message shadow-lg`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if(!val) return;

            appendMessage(val, 'user');
            input.value = '';
            
            const typing = document.getElementById('typing');
            typing.style.display = 'block';

            try {
                if(!apiKey) {
                    setTimeout(() => {
                        typing.style.display = 'none';
                        appendMessage("እየሰማሁዎት ነው። ድረ-ገጹ አሁን በትክክል እየሠራ ነው። ሙሉ የ AI አገልግሎት ለማግኘት ግን የ API ቁልፍ (Key) በኮዱ ውስጥ መጨመር ያስፈልጋል።", 'ai');
                    }, 1500);
                    return;
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                
                const data = await response.json();
                typing.style.display = 'none';
                const aiText = data.candidates[0].content.parts[0].text;
                appendMessage(aiText, 'ai');
                
            } catch (error) {
                typing.style.display = 'none';
                appendMessage("ይቅርታ፣ ከግንኙነት መስመር ጋር የተያያዘ ስህተት ተፈጥሯል። እባክዎ በድጋሚ ይሞክሩ።", 'ai');
            }
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
        
        document.getElementById('access-code').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') unlockApp();
        });
    </script>
</body>
</html>
