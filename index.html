<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Gold AI | Camera & File Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'zion-gold-file-pro';

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Error", err); }
        };
        initAuth();
        window.zionDB = { db, auth, appId, collection, addDoc, query, onSnapshot, serverTimestamp, doc, setDoc };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;600&display=swap');
        
        :root { 
            --gold: #D4AF37; 
            --gold-light: #F9E29B;
            --gold-dark: #996515;
            --bg-black: #050505;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-black); 
            color: #f0f0f0; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }

        .gold-gradient-text {
            background: linear-gradient(to right, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 1.5rem;
        }

        .bubble {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .ai-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid var(--gold);
            align-self: flex-start;
        }

        .user-bubble {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            font-weight: 600;
            align-self: flex-end;
        }

        .camera-overlay {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #camera-video {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            border: 2px solid var(--gold);
        }

        .loader-dot {
            width: 5px; height: 5px; background: var(--gold); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .action-button {
            transition: all 0.2s;
        }
        .action-button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-white/5 bg-black/40 backdrop-blur-md shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-gold to-gold-dark rounded-xl flex items-center justify-center">
                <i class="fas fa-camera-retro text-black"></i>
            </div>
            <div>
                <h1 class="font-cinzel text-xl gold-gradient-text">ZION GOLD AI</h1>
                <p class="text-[8px] text-zinc-500 uppercase tracking-[3px]">Vision & File Intelligence</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button onclick="clearChat()" class="text-zinc-500 hover:text-white transition"><i class="fas fa-trash-alt"></i></button>
            <div class="w-3 h-3 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e] self-center"></div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main class="chat-area flex flex-col space-y-4" id="chat-box">
        <div class="ai-bubble bubble shadow-lg">
            <p>እንኳን ወደ ጽዮን ጎልድ AI በሰላም መጡ።</p>
            <p class="text-sm text-zinc-400 mt-2">ፎቶዎችን ማንሳት፣ ሰነዶችን መስቀል ወይም ማንኛውንም ጥያቄ መጠየቅ ይችላሉ። እኔን ለማናገር ከታች ያሉትን አማራጮች ይጠቀሙ።</p>
        </div>
    </main>

    <!-- Camera UI Overlay -->
    <div id="camera-overlay" class="camera-overlay p-6">
        <div class="flex justify-between w-full max-w-lg mb-4">
            <h2 class="gold-gradient-text font-cinzel">ጽዮን ካሜራ</h2>
            <button onclick="closeCamera()" class="text-white text-2xl">&times;</button>
        </div>
        <video id="camera-video" autoplay playsinline></video>
        <canvas id="camera-canvas" class="hidden"></canvas>
        <div class="mt-8 flex gap-6">
            <button onclick="takeSnapshot()" class="w-20 h-20 bg-white border-8 border-gold/30 rounded-full active:bg-gold transition"></button>
        </div>
        <p class="mt-4 text-zinc-500 text-xs">ፎቶ ለማንሳት ነጩን ቁልፍ ይጫኑ</p>
    </div>

    <!-- Upload/Preview Indicator Area -->
    <div id="upload-preview" class="hidden px-8 py-3 bg-gold/5 border-t border-gold/10 shrink-0">
        <div class="flex items-center justify-between max-w-lg">
            <div class="flex items-center gap-3">
                <div id="file-icon" class="text-gold text-2xl"><i class="fas fa-file-alt"></i></div>
                <div>
                    <p id="file-name" class="text-sm font-bold text-gold truncate max-w-[200px]">filename.pdf</p>
                    <p id="file-type" class="text-[10px] text-zinc-500 uppercase">File Attached</p>
                </div>
            </div>
            <button onclick="clearFile()" class="text-red-500 p-2"><i class="fas fa-times-circle"></i></button>
        </div>
        <img id="img-mini-preview" class="hidden mt-2 h-20 w-20 object-cover rounded-lg border border-gold">
    </div>

    <!-- Typing Indicator -->
    <div id="typing" class="px-10 py-2 hidden shrink-0">
        <div class="flex gap-1.5 items-center">
            <span class="loader-dot"></span><span class="loader-dot" style="animation-delay: 0.2s"></span><span class="loader-dot" style="animation-delay: 0.4s"></span>
            <span class="text-[10px] text-zinc-500 font-bold ml-2">ZION IS ANALYZING...</span>
        </div>
    </div>

    <!-- Input Footer -->
    <footer class="p-4 bg-black/60 border-t border-white/5 shrink-0">
        <div class="max-w-5xl mx-auto flex flex-col gap-3">
            <form id="chat-form" class="flex items-center gap-3">
                <!-- Camera Button -->
                <button type="button" onclick="openCamera()" class="action-button w-12 h-12 rounded-xl border border-gold/30 flex items-center justify-center bg-gold/5 text-gold hover:bg-gold/10">
                    <i class="fas fa-camera"></i>
                </button>

                <!-- File Upload Button -->
                <label class="action-button w-12 h-12 rounded-xl border border-gold/30 flex items-center justify-center bg-gold/5 text-gold hover:bg-gold/10 cursor-pointer">
                    <input type="file" id="universal-upload" class="hidden" onchange="handleFileUpload(event)">
                    <i class="fas fa-paperclip"></i>
                </label>
                
                <div class="flex-1 flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl px-4 py-0.5">
                    <input type="text" id="user-input" placeholder="ጥያቄዎን ይጻፉ..." 
                        class="w-full bg-transparent py-4 outline-none text-white text-sm placeholder:text-zinc-600">
                    <button type="submit" class="w-10 h-10 bg-gold rounded-lg flex items-center justify-center text-black shadow-xl">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </form>
        </div>
    </footer>

    <script>
        const apiKey = ""; // Runtime provides this
        let currentFileBase64 = null;
        let currentFileType = null;
        let stream = null;

        // Camera Logic
        async function openCamera() {
            try {
                const overlay = document.getElementById('camera-overlay');
                const video = document.getElementById('camera-video');
                overlay.style.display = 'flex';
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) {
                alert("ካሜራውን መክፈት አልተቻለም። እባክዎ ፈቃድ ይስጡ።");
            }
        }

        function closeCamera() {
            const overlay = document.getElementById('camera-overlay');
            overlay.style.display = 'none';
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        function takeSnapshot() {
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/png');
            currentFileBase64 = dataUrl.split(',')[1];
            currentFileType = 'image/png';
            
            document.getElementById('file-name').innerText = "የተነሳ ፎቶ.png";
            document.getElementById('file-type').innerText = "Camera Capture";
            document.getElementById('img-mini-preview').src = dataUrl;
            document.getElementById('img-mini-preview').classList.remove('hidden');
            document.getElementById('file-icon').innerHTML = '<i class="fas fa-camera"></i>';
            document.getElementById('upload-preview').classList.remove('hidden');
            
            closeCamera();
        }

        // File Logic
        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            currentFileType = file.type;
            const reader = new FileReader();
            
            reader.onload = (event) => {
                currentFileBase64 = event.target.result.split(',')[1];
                document.getElementById('file-name').innerText = file.name;
                document.getElementById('file-type').innerText = file.type || "Unknown File";
                document.getElementById('upload-preview').classList.remove('hidden');

                if (file.type.startsWith('image/')) {
                    document.getElementById('img-mini-preview').src = event.target.result;
                    document.getElementById('img-mini-preview').classList.remove('hidden');
                    document.getElementById('file-icon').innerHTML = '<i class="fas fa-image"></i>';
                } else {
                    document.getElementById('img-mini-preview').classList.add('hidden');
                    document.getElementById('file-icon').innerHTML = '<i class="fas fa-file-alt"></i>';
                }
            };
            reader.readAsDataURL(file);
        }

        function clearFile() {
            currentFileBase64 = null;
            currentFileType = null;
            document.getElementById('upload-preview').classList.add('hidden');
            document.getElementById('universal-upload').value = "";
        }

        function clearChat() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '<div class="ai-bubble bubble shadow-lg">ውይይቱ ተሰርዟል። ምን ልርዳዎት?</div>';
        }

        // AI Logic
        async function analyzeWithAI(prompt, base64 = null) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const parts = [{ text: prompt }];
            if (base64) {
                parts.push({
                    inlineData: {
                        mimeType: currentFileType || "image/png",
                        data: base64
                    }
                });
            }

            const payload = {
                contents: [{ parts: parts }],
                systemInstruction: { parts: [{ text: "You are Zion Gold AI, a luxury strategic assistant. You can see images and read files. Always respond in professional Amharic. Provide detailed insights about uploaded content." }] }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "ይቅርታ፣ ምላሽ ማግኘት አልቻልኩም።";
            } catch (err) {
                return "የኔትወርክ ችግር አጋጥሟል። እባክዎ እንደገና ይሞክሩ።";
            }
        }

        function addMessage(text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `${type}-bubble bubble shadow-lg animate-fade-in`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text && !currentFileBase64) return;

            const userMsg = text || "ይህን ፋይል/ፎቶ መርምርልኝ";
            addMessage(userMsg, 'user');
            
            const b64 = currentFileBase64;
            input.value = '';
            clearFile();
            
            document.getElementById('typing').classList.remove('hidden');
            const res = await analyzeWithAI(userMsg, b64);
            document.getElementById('typing').classList.add('hidden');
            addMessage(res, 'ai');
        });
    </script>
</body>
</html>
